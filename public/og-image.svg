<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0b14"/>
      <stop offset="1" stop-color="#16162a"/>
    </linearGradient>
    <linearGradient id="tile" x1="80" y1="200" x2="240" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6d5efc"/>
      <stop offset="1" stop-color="#4a36c4"/>
    </linearGradient>
    <linearGradient id="txt" x1="90" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a9b0ff"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#37e6c9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="320" fill="#6d5efc" opacity="0.12"/>
  <circle cx="120" cy="560" r="240" fill="#37e6c9" opacity="0.08"/>

  <!-- logo tile -->
  <g transform="translate(90,90)">
    <rect width="120" height="120" rx="30" fill="url(#tile)"/>
    <path d="M44 30 V78" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
    <path d="M44 32 H62 A16 16 0 0 1 62 64 H44" fill="none" stroke="#ffffff" stroke-width="12"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M42 92 q9 -9 18 0 t 18 0" fill="none" stroke="#37e6c9" stroke-width="6.5" stroke-linecap="round"/>
  </g>
  <text x="240" y="170" font-family="'Space Grotesk', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Probably Useful</text>

  <text x="90" y="360" font-family="'Space Grotesk', Arial, sans-serif" font-size="88" font-weight="700" fill="url(#txt)">Turning personal fixes</text>
  <text x="90" y="460" font-family="'Space Grotesk', Arial, sans-serif" font-size="88" font-weight="700" fill="url(#txt)">into public utilities.</text>

  <text x="90" y="545" font-family="Inter, Arial, sans-serif" font-size="34" fill="#a9b0ff">Small, free tools built to solve real problems. Maybe yours too.</text>
</svg>
